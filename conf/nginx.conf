# Redirect /path to /path/ so index.html and SPA routes resolve (sub-path installs only)
#sub_path_only location = __PATH__ {
#sub_path_only     return 301 __PATH__/;
#sub_path_only }

location __PATH__/ {
    alias __INSTALL_DIR__/www/;
    index index.html;
    try_files $uri $uri/ __PATH__/index.html;
}

# Media uploads served by Fastify (uploaded images)
location __PATH__/media/ {
    proxy_pass http://127.0.0.1:__PORT__/blog/media/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

# API (Fastify) on localhost; SSOWat headers forwarded for trusted identity
location __PATH__/api/ {
        proxy_pass http://127.0.0.1:__PORT__/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSOWat injects Ynh-* and Authorization: Basic; forward both for Node SSO
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Ynh-User $http_ynh_user;
        proxy_set_header Ynh-User-Email $http_ynh_user_email;
        proxy_set_header Ynh-User-Fullname $http_ynh_user_fullname;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

# Regex alias must map captured path — bare alias + try_files breaks for /path/*.js
location ~* ^__PATH__/(.+\.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot))$ {
    alias __INSTALL_DIR__/www/$1;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

include conf.d/yunohost_panel.conf.inc;
