name: Deploy to YunoHost

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-ynh-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Upgrade app on YunoHost
    runs-on: ubuntu-latest
    environment:
      name: production
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)

    steps:
      - name: Resolve deployment configuration
        env:
          DEFAULT_APP_ID: book-review-blog
          DEFAULT_SOURCE_URL: https://github.com/rdarocha-bcg/book-review-blog_ynh
          VAR_APP_ID: ${{ vars.YNH_APP_INSTANCE_ID }}
          VAR_SOURCE_URL: ${{ vars.YNH_APP_SOURCE_URL }}
          VAR_SSH_PORT: ${{ vars.YNH_SSH_PORT }}
        run: |
          APP_ID="${VAR_APP_ID:-$DEFAULT_APP_ID}"
          SOURCE_URL="${VAR_SOURCE_URL:-$DEFAULT_SOURCE_URL}"
          SSH_PORT="${VAR_SSH_PORT:-22}"

          case "$SOURCE_URL" in
            *_ynh|*_ynh.git)
              ;;
            *)
              echo "::error::SOURCE_URL must target a YunoHost packaging repository ending with '_ynh'."
              exit 1
              ;;
          esac

          echo "APP_ID=$APP_ID" >> "$GITHUB_ENV"
          echo "SOURCE_URL=$SOURCE_URL" >> "$GITHUB_ENV"
          echo "SSH_PORT=$SSH_PORT" >> "$GITHUB_ENV"

      - name: Setup SSH private key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.YNH_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"

      - name: Configure SSH known hosts
        env:
          SSH_HOST: ${{ secrets.YNH_SSH_HOST }}
          KNOWN_HOSTS: ${{ secrets.YNH_SSH_KNOWN_HOSTS }}
        run: |
          if [ -z "$KNOWN_HOSTS" ]; then
            echo "::error::Missing required secret YNH_SSH_KNOWN_HOSTS."
            exit 1
          fi
          printf '%s\n' "$KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy YunoHost app (install or upgrade)
        env:
          SSH_HOST: ${{ secrets.YNH_SSH_HOST }}
          SSH_USER: ${{ secrets.YNH_SSH_USER }}
          SSH_PORT: ${{ env.SSH_PORT }}
          APP_ID: ${{ env.APP_ID }}
          SOURCE_URL: ${{ env.SOURCE_URL }}
          YNH_DOMAIN: ${{ secrets.YNH_SSH_HOST }}
        run: |
          # Install expect for automating interactive prompts
          sudo apt-get update && sudo apt-get install -y expect >/dev/null 2>&1 || true

          # Create expect script for app installation
          cat > /tmp/install_app.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 300
          set host [lindex $argv 0]
          set user [lindex $argv 1]
          set port [lindex $argv 2]
          set domain [lindex $argv 3]
          set path [lindex $argv 4]
          set source_url [lindex $argv 5]
          set key_file [lindex $argv 6]

          spawn ssh -i $key_file -p $port -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$::env(HOME)/.ssh/known_hosts $user@$host sudo yunohost app install $source_url

          expect {
            -re "domain|Domain" {
              send "$domain\r"
              exp_continue
            }
            -re "path|Path" {
              send "$path\r"
              exp_continue
            }
            -re "permission|Permission" {
              send "visitors\r"
              exp_continue
            }
            -re "admin|Admin" {
              send "\r"
              exp_continue
            }
            "eof" { }
            timeout { puts "Timeout waiting for prompts"; exit 1 }
          }
          EOF

          chmod +x /tmp/install_app.exp

          # Try to install, fallback to upgrade
          expect /tmp/install_app.exp "$SSH_HOST" "$SSH_USER" "$SSH_PORT" "$YNH_DOMAIN" "/blog" "$SOURCE_URL" "$HOME/.ssh/id_ed25519" 2>&1 && echo "App installed" || \
          ssh -i "$HOME/.ssh/id_ed25519" -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o IdentitiesOnly=yes \
            "$SSH_USER@$SSH_HOST" \
            "sudo yunohost app upgrade '$APP_ID' -u '$SOURCE_URL' 2>&1"
